<!--
    DANIEL UCHECHUKWU-MOSES
    Shared navbar component — injected into every page via main.js.
    Contains the futTalk brand link, home icon, and a search bar.
    IDs on key elements (nav-brand, nav-home, nav-search, nav-search-btn)
    allow JS to target them for future interactivity.
-->

<!-- DANIEL UCHECHUKWU-MOSES — Main navigation bar using Bootstrap's responsive navbar;
     collapses into a hamburger menu on smaller screens -->
<nav class="navbar navbar-expand-lg bg-body-tertiary ">
  <div class="container-fluid">

    <!-- DANIEL UCHECHUKWU-MOSES — Brand name link; clicking it returns the user to the home page -->
    <a id="nav-brand" class="navbar-brand" href="#">futTalk</a>

    <!-- DANIEL UCHECHUKWU-MOSES — Hamburger toggle button shown on mobile to expand/collapse the nav links -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- DANIEL UCHECHUKWU-MOSES — Collapsible section: holds nav links and the search bar -->
    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <!-- DANIEL UCHECHUKWU-MOSES — Nav link list; me-auto pushes the search bar to the right -->
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">

        <!-- DANIEL UCHECHUKWU-MOSES — Home icon link; navigates back to the main index page -->
        <li class="nav-item">
          <a id="nav-home" class="nav-link active" href="/index.html">
              <img src="/images/home.png" alt="Home" width="24" height="24">
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>

        <!-- DANIEL UCHECHUKWU-MOSES — Dropdown nav item with sub-links for additional pages -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Dropdown
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Action</a></li>
            <li><a class="dropdown-item" href="#">Another action</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Something else here</a></li>
          </ul>
        </li>

        <!-- DANIEL UCHECHUKWU-MOSES — Placeholder disabled link; not yet linked to any page -->
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>
      </ul>

      <!-- DANIEL UCHECHUKWU-MOSES — Search bar on the right side of the navbar;
           nav-search is the input field, nav-search-btn triggers the search -->
      <form class="d-flex" role="search">
        <input id="nav-search" class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button id="nav-search-btn" class="btn btn-outline-success" type="submit">Search</button>
      </form>

    </div>
  </div>
</nav>
