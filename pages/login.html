<!DOCTYPE html>
<html lang="en">
    <head>
        <title>futTalk</title>
        <meta name="comp1800 template" content="futTalk">
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Bootstrap Icons -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
        <!-- Custom styles -->
        <link rel="stylesheet" href="../css/style.css">
    </head>

    <body>
        <!------------------------------>
        <!-- Your HTML Layout go here -->
        <!------------------------------>
        <div id="navbar"></div>

        <!-- Stuff for body goes here -->
        <div id="authAlert" class="alert alert-danger d-none" role="alert"></div>
        
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">

                    <div class="card p-4 shadow-sm">

                        <!-- Login -->
                        <div id="loginView">
                            <h3 class="mb-3 text-center">Login</h3>
                            <form id="loginForm" novalidate>
                                <div class="mb-3">
                                    <input type="email" id="loginEmail" class="form-control" placeholder="Email" required />
                                </div>
                                <div class="mb-3">
                                    <input type="password" id="loginPassword" class="form-control" placeholder="Password" required />
                                </div>
                                <button id="loginButton" type="submit" class="btn btn-primary w-100">Login</button>
                            </form>
                            <small class="d-block mt-3 text-center">
                            Don’t have an account?
                            <a href="#" id="toSignup">Sign up</a>
                            </small>
                        </div>

                        <!-- Signup -->
                        <div id="signupView" class="d-none">
                            <h3 class="mb-3 text-center">Sign Up</h3>
                            <form id="signupForm" novalidate>
                                <div class="mb-3">
                                    <input type="text" id="signupName" class="form-control" placeholder="First and Last Name" required />
                                </div>
                                <div class="mb-3">
                                    <input type="email" id="signupEmail" class="form-control" placeholder="Email" required />
                                </div>
                                <div class="mb-3">
                                    <input type="password" id="signupPassword" class="form-control" placeholder="Password" required />
                                </div>
                                <button type="submit" class="btn btn-success w-100">Create Account</button>
                            </form>
                            <small class="d-block mt-3 text-center">
                            Already have an account?
                            <a href="#" id="toLogin">Login</a>
                            </small>
                        </div>
                    
                    </div>
                
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div id="footer"></div>

        <!---------------------------------------------->
        <!-- Your own JavaScript functions go here    -->
        <!---------------------------------------------->

        <!-- Bootstrap JS Bundle -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        
        <!-- Link to scripts of your own -->
        <script type="module" src="../js/main.js"></script>
        <script type="module" src="../js/loginsignup.js"></script>
        <script type="module" src="../js/firebaseConfig.js"></script>
        <script type="module" src="../js/authentication.js"></script>
    </body>
</html>
