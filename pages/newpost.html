<!--
    DANIEL UCHECHUKWU-MOSES
    New post creation page — allows users to compose and submit new posts to Firestore.
    Includes form inputs for title, category/tags, and body text.
    Shows loading spinner while saving, success message after submission.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Create Post</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — layout, flex utilities, form styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — icons for UI elements -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Page-specific styles for newpost -->
    <link rel="stylesheet" href="../css/newpost.css">
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared navbar here -->
    <div id="navbar"></div>

    <div class="form-container">
        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: shown while post is being saved to Firestore -->
        <div id="post-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Posting...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Success message: shown after post is submitted -->
        <div id="post-success" class="text-center">
            <i class="bi bi-check-circle me-2"></i> Your post has been created!
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Main form container for creating a new post -->
        <div id="newpost-form-container" class="newpost-container">
            <!-- User profile icon header -->
            <div class="newpost-header">
                <i class="bi bi-person-circle user-icon"></i>
            </div>

            <form id="newpostForm">
                <!-- Post subject input -->
                <div class="form-group">
                    <label for="postTitle">Subject *</label>
                    <input
                        type="text"
                        class="form-control"
                        id="postTitle"
                        placeholder="Enter post title..."
                        required>
                </div>

                <!-- Category/tags selector -->
                <div class="form-group">
                    <label for="postCategory">Category *</label>
                    <select
                        class="form-control category-select"
                        id="postCategory"
                        required>
                        <option value="">Select a category...</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Tips">Tips</option>
                        <option value="Events">Events</option>
                        <option value="Match">Match</option>
                        <option value="Travel">Travel</option>
                    </select>
                </div>

                <!-- Post body/content textarea -->
                <div class="form-group">
                    <label for="postBody">Post Content *</label>
                    <textarea
                        class="form-control"
                        id="postBody"
                        placeholder="Write your post here..."
                        required></textarea>

                    <!-- Filter buttons for text formatting -->
                    <div class="filter-buttons">
                        <button type="button" class="filter-btn" title="Bold"><i class="bi bi-type-bold"></i></button>
                        <button type="button" class="filter-btn" title="Italic"><i class="bi bi-type-italic"></i></button>
                        <button type="button" class="filter-btn" title="Link"><i class="bi bi-link-45deg"></i></button>
                    </div>
                </div>

                <!-- Form action buttons -->
                <div class="form-actions">
                    <a
                        href="post.html"
                        class="btn-cancel"
                        id="btn-cancel">
                        Back to Posts
                    </a>
                    <button
                        type="submit"
                        class="btn-submit"
                        id="btn-submit">
                        <i class="bi bi-check-lg me-1"></i> Submit
                    </button>
                </div>
            </form>

            <!-- Posted message with preview (shown after success) -->
            <div id="post-posted" style="display: none; margin-top: 2rem;">
                <p class="text-muted">Your post:</p>
                <div class="post-preview">
                    <div class="post-preview-title" id="posted-title"></div>
                    <div class="post-preview-body" id="posted-body"></div>
                </div>
                <div class="text-center mt-3">
                    <a href="post.html" class="back-link">
                        <i class="bi bi-arrow-left me-1"></i> Back to Posts
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared footer here -->
    <div id="footer"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Main.js loads navbar -->
    <script type="module" src="../js/main.js"></script>

    <!-- newpost.js handles form submission and Firestore save -->
    <script type="module" src="../js/newpost.js"></script>

</body>

</html>
