<!--
    DANIEL UCHECHUKWU-MOSES
    Post detail page — shows the full content of a single post and its replies.
    Displays the post card (title, author, category, upvotes, body) followed by
    a list of reply cards, each with a username, reply text, and like count.
    Includes Back to Post and Reply action buttons at the bottom.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Post Details</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — layout, flex utilities, and button styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — icons for avatar, pin, star, thumbs up, arrows, etc. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Page-specific styles for the post details layout, post card, and reply card design -->
    <link rel="stylesheet" href="../css/post-details.css">
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared navbar here -->
    <div id="navbar"></div>

    <div class="container mt-3 details-content-area">

        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: visible while Firestore fetch is in progress -->
        <div id="post-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Error state: shown when docID is missing or post not found -->
        <div id="post-error" class="text-center py-5 d-none">
            <p class="text-muted">Post not found or no post ID provided.</p>
            <a href="post.html" class="btn btn-outline-dark-custom mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Posts
            </a>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Full post card: shows author avatar, title, username,
             category badge, upvote count, bookmark icon, and the full post body text.
             Hidden by default; post-details.js reveals it after data is loaded from Firestore. -->
        <div id="post-detail-1" class="post-detail-card p-3 mb-3 d-none">

            <!-- Post header: avatar + title + username + date -->
            <div class="d-flex align-items-start gap-2 mb-2">
                <i class="bi bi-person-circle avatar-icon"></i>
                <div>
                    <p id="post-title" class="post-title"></p>
                    <span id="post-author" class="post-username"></span>
                    <small id="post-date" class="text-muted d-block mt-1" style="font-size:0.78rem;"></small>
                </div>
            </div>

            <!-- DANIEL UCHECHUKWU-MOSES — Row showing: pin icon, category badge,
                 upvote count (pushed to the right), and bookmark/save icon -->
            <div class="d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-pin-angle-fill small"></i>
                <span id="post-category" class="post-category-badge"></span>
                <!-- ms-auto pushes the upvote count and star to the far right -->
                <span id="upvote-count" class="post-upvote ms-auto"></span>
                <i id="detail-save-btn" class="bi bi-star post-save-btn"></i>
            </div>

            <!-- DANIEL UCHECHUKWU-MOSES — Full body text of the post, injected by post-details.js -->
            <p id="post-body" class="post-body"></p>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: shown while replies are being fetched -->
        <div id="replies-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading replies...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Heading that shows the total number of replies -->
        <p id="replies-heading" class="replies-heading mb-3" style="display: none;">Replies (<span id="reply-count">0</span>):</p>

        <!-- DANIEL UCHECHUKWU-MOSES — Reply cards container: dynamically populated with replies from Firestore -->
        <div id="repliesContainer"></div>

        <!-- DANIEL UCHECHUKWU-MOSES — Action buttons row:
             Back to Post returns to the post feed, Reply opens the reply form -->
        <div class="d-flex justify-content-end gap-2 mt-3 mb-4">
            <a id="btn-back-to-post" href="post.html" class="btn btn-outline-dark-custom">
                <i class="bi bi-arrow-left me-1"></i> Back to Post
            </a>
            <a id="btn-reply" href="reply.html" class="btn btn-dark-custom">
                <i class="bi bi-chat-right-text-fill me-1"></i> Reply
            </a>
        </div>

    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared footer here -->
    <div id="footer"></div>

    <!-- Bootstrap JS — needed for navbar toggle on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads main.js which fetches and injects the shared navbar and footer -->
    <script type="module" src="../js/main.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Reads ?docID= from URL and loads the post from Firestore -->
    <script type="module" src="../js/post-details.js"></script>

</body>

</html>
