<!--
    DANIEL UCHECHUKWU-MOSES
    Post detail page — shows the full content of a single post and its replies.
    Displays the post card (title, author, category, upvotes, body) followed by
    a list of reply cards, each with a username, reply text, and like count.
    Includes Back to Post and Reply action buttons at the bottom.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Post Details</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — layout, flex utilities, and button styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — icons for avatar, pin, star, thumbs up, arrows, etc. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* DANIEL UCHECHUKWU-MOSES — White page background */
        body {
            background-color: #fff;
        }

        /* DANIEL UCHECHUKWU-MOSES — Large avatar icon at the top of the page
           representing the logged-in user */
        .user-profile-header .avatar-icon {
            font-size: 3.5rem;
            color: #333;
        }

        /* DANIEL UCHECHUKWU-MOSES — Gray rounded card that displays the full post */
        .post-detail-card {
            background-color: #d9d9d9;
            border: none;
            border-radius: 8px;
        }

        /* DANIEL UCHECHUKWU-MOSES — Bold title text inside the post card */
        .post-detail-card .post-title {
            font-weight: 700;
            font-size: 1rem;
            color: #000;
            margin-bottom: 0;
        }

        /* DANIEL UCHECHUKWU-MOSES — Author username shown below the post title */
        .post-detail-card .post-username {
            font-size: 0.82rem;
            color: #444;
        }

        /* DANIEL UCHECHUKWU-MOSES — Small pill badge showing the post category */
        .post-detail-card .post-category-badge {
            font-size: 0.75rem;
            background-color: #fff;
            color: #333;
            border: 1px solid #aaa;
            border-radius: 4px;
            padding: 1px 8px;
        }

        /* DANIEL UCHECHUKWU-MOSES — Upvote count displayed to the right of the category row */
        .post-detail-card .post-upvote {
            font-size: 0.85rem;
            color: #333;
        }

        /* DANIEL UCHECHUKWU-MOSES — Bookmark/star icon for saving the post */
        .post-detail-card .post-save-btn {
            font-size: 1.15rem;
            color: #333;
            cursor: pointer;
        }

        /* DANIEL UCHECHUKWU-MOSES — Full body text of the post */
        .post-detail-card .post-body {
            font-size: 0.9rem;
            color: #222;
        }

        /* DANIEL UCHECHUKWU-MOSES — Avatar icon inside the post card header */
        .post-detail-card .avatar-icon {
            font-size: 2.4rem;
            color: #333;
            flex-shrink: 0;
        }

        /* DANIEL UCHECHUKWU-MOSES — Bold heading above the replies list showing reply count */
        .replies-heading {
            font-weight: 700;
            font-size: 1rem;
            color: #111;
        }

        /* DANIEL UCHECHUKWU-MOSES — Gray rounded card for each individual reply */
        .reply-card {
            background-color: #d9d9d9;
            border: none;
            border-radius: 8px;
        }

        /* DANIEL UCHECHUKWU-MOSES — Small dark circle avatar for the reply author */
        .reply-card .reply-avatar {
            width: 36px;
            height: 36px;
            background-color: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* DANIEL UCHECHUKWU-MOSES — White person icon inside the dark avatar circle */
        .reply-card .reply-avatar i {
            color: #fff;
            font-size: 1.1rem;
        }

        /* DANIEL UCHECHUKWU-MOSES — Bold username of the person who wrote the reply */
        .reply-card .reply-username {
            font-weight: 700;
            font-size: 0.85rem;
            color: #111;
        }

        /* DANIEL UCHECHUKWU-MOSES — The actual text content of the reply */
        .reply-card .reply-text {
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 0;
        }

        /* DANIEL UCHECHUKWU-MOSES — Like count with thumbs-up icon shown at bottom-right of each reply */
        .reply-card .reply-likes {
            font-size: 0.82rem;
            color: #333;
        }

        /* DANIEL UCHECHUKWU-MOSES — Outlined dark button used for the Back to Post action */
        .btn-outline-dark-custom {
            color: #111;
            border: 1.5px solid #111;
            background-color: transparent;
        }

        .btn-outline-dark-custom:hover {
            background-color: #111;
            color: #fff;
        }

        /* DANIEL UCHECHUKWU-MOSES — Solid dark button used for the Reply action */
        .btn-dark-custom {
            background-color: #111;
            color: #fff;
            border: 1.5px solid #111;
        }

        .btn-dark-custom:hover {
            background-color: #333;
            color: #fff;
        }

        /* DANIEL UCHECHUKWU-MOSES — Bottom padding so content doesn't get cut off */
        .details-content-area {
            padding-bottom: 2rem;
        }
    </style>
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared navbar here -->
    <div id="navbar"></div>

    <div class="container mt-3 details-content-area">

        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: visible while Firestore fetch is in progress -->
        <div id="post-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Error state: shown when docID is missing or post not found -->
        <div id="post-error" class="text-center py-5 d-none">
            <p class="text-muted">Post not found or no post ID provided.</p>
            <a href="post.html" class="btn btn-outline-dark-custom mt-2">
                <i class="bi bi-arrow-left me-1"></i> Back to Posts
            </a>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Full post card: shows author avatar, title, username,
             category badge, upvote count, bookmark icon, and the full post body text.
             Hidden by default; post-details.js reveals it after data is loaded from Firestore. -->
        <div id="post-detail-1" class="post-detail-card p-3 mb-3 d-none">

            <!-- Post header: avatar + title + username + date -->
            <div class="d-flex align-items-start gap-2 mb-2">
                <i class="bi bi-person-circle avatar-icon"></i>
                <div>
                    <p id="post-title" class="post-title"></p>
                    <span id="post-author" class="post-username"></span>
                    <small id="post-date" class="text-muted d-block mt-1" style="font-size:0.78rem;"></small>
                </div>
            </div>

            <!-- DANIEL UCHECHUKWU-MOSES — Row showing: pin icon, category badge,
                 upvote count (pushed to the right), and bookmark/save icon -->
            <div class="d-flex align-items-center gap-2 mb-3">
                <i class="bi bi-pin-angle-fill small"></i>
                <span id="post-category" class="post-category-badge"></span>
                <!-- ms-auto pushes the upvote count and star to the far right -->
                <span id="upvote-count" class="post-upvote ms-auto"></span>
                <i id="detail-save-btn" class="bi bi-star post-save-btn"></i>
            </div>

            <!-- DANIEL UCHECHUKWU-MOSES — Full body text of the post, injected by post-details.js -->
            <p id="post-body" class="post-body"></p>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: shown while replies are being fetched -->
        <div id="replies-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading replies...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Heading that shows the total number of replies -->
        <p id="replies-heading" class="replies-heading mb-3" style="display: none;">Replies (<span id="reply-count">0</span>):</p>

        <!-- DANIEL UCHECHUKWU-MOSES — Reply cards container: dynamically populated with replies from Firestore -->
        <div id="repliesContainer"></div>

        <!-- DANIEL UCHECHUKWU-MOSES — Action buttons row:
             Back to Post returns to the post feed, Reply opens the reply form -->
        <div class="d-flex justify-content-end gap-2 mt-3 mb-4">
            <a id="btn-back-to-post" href="post.html" class="btn btn-outline-dark-custom">
                <i class="bi bi-arrow-left me-1"></i> Back to Post
            </a>
            <a id="btn-reply" href="reply.html" class="btn btn-dark-custom">
                <i class="bi bi-chat-right-text-fill me-1"></i> Reply
            </a>
        </div>

    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared footer here -->
    <div id="footer"></div>

    <!-- Bootstrap JS — needed for navbar toggle on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads main.js which fetches and injects the shared navbar and footer -->
    <script type="module" src="../js/main.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Reads ?docID= from URL and loads the post from Firestore -->
    <script type="module" src="../js/post-details.js"></script>

</body>

</html>
