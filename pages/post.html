<!--
    DANIEL UCHECHUKWU-MOSES
    Post feed page — displays a scrollable list of community posts.
    Each post card shows a title (clickable → post-details.html), category badge,
    upvote count, comment count, and a save/bookmark button.
    Includes floating action buttons for search and creating a new post.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Posts</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — provides layout grid, card, button, and flex utilities -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — icon font used for avatars, pins, stars, arrows, etc. -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- DANIEL UCHECHUKWU-MOSES — Page-specific styles for the post feed -->
    <link rel="stylesheet" href="../css/post.css">
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Empty div that main.js fills with the shared navbar component -->
    <div id="navbar"></div>

    <div class="container mt-3 posts-container">

        <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: shown while posts are being fetched from Firestore -->
        <div id="posts-loading" class="text-center py-5">
            <div class="spinner-border text-secondary" role="status">
                <span class="visually-hidden">Loading posts...</span>
            </div>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Post feed container; holds all post cards dynamically loaded from Firestore -->
        <div id="postsFeed"></div>

    </div><!-- end .container -->

    <!-- DANIEL UCHECHUKWU-MOSES — Floating action buttons: search and create post -->
    <div class="fab-container">
        <a href="newpost.html" class="fab-btn" title="Create a new post">
            <i class="bi bi-plus-lg"></i>
        </a>
        <button class="fab-btn" title="Search posts" onclick="alert('Search feature coming soon!')">
            <i class="bi bi-search"></i>
        </button>
    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared footer here -->
    <div id="footer"></div>

    <!-- Bootstrap JS — needed for navbar toggle on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads main.js which fetches and injects the shared navbar and footer -->
    <script type="module" src="../js/main.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads posts from Firestore and dynamically renders the post feed -->
    <script type="module" src="../js/post.js"></script>

</body>

</html>
