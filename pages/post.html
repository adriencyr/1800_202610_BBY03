<!--
    DANIEL UCHECHUKWU-MOSES
    Post feed page — displays a scrollable list of community posts.
    Each post card shows a title (clickable → post-details.html), category badge,
    upvote count, comment count, and a save/bookmark button.
    Includes floating action buttons for search and creating a new post.
-->
<!doctype html>
<html lang="en">
  <head>
    <title>futTalk - Posts</title>
    <meta name="comp1800 template" content="futTalk" />

    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS — provides layout grid, card, button, and flex utilities -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons — icon font used for avatars, pins, stars, arrows, etc. -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
  </head>

  <body>
    <!-- DANIEL UCHECHUKWU-MOSES — Empty div that main.js fills with the shared navbar component -->
    <div id="navbar"></div>

    <div class="container mt-3 posts-container">
      <!-- DANIEL UCHECHUKWU-MOSES — Loading spinner: shown while posts are being fetched from Firestore -->
      <div id="posts-loading" class="text-center py-5">
        <div class="spinner-border text-secondary" role="status">
          <span class="visually-hidden">Loading posts...</span>
        </div>
      </div>

      <!-- Sort Control -->
      <div class="sort-controls mb-3 d-flex gap-2 justify-content-start">
        <label for="sortSelect" class="form-label me-2" style="margin-top: 0.5rem;">Sort:</label>
        <select id="sortSelect" class="form-select" style="width: auto; max-width: 200px;">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="alphabetical">A-Z</option>
        </select>
      </div>

      <!-- Post feed container — filled dynamically by post.js -->
      <div id="postsFeed"></div>

      <!-- Pagination Controls (at bottom) -->
      <div class="pagination-controls text-center mt-4 mb-5">
        <button
          id="prevPageBtn"
          class="btn btn-lg btn-dark"
          style="font-size: 1.5rem; padding: 10px 15px"
        >
          &larr;
        </button>
        <span
          id="pageNumbers"
          class="mx-3"
          style="font-size: 1.2rem; font-weight: bold"
        >
          <!-- Page numbers will be populated here by JavaScript -->
        </span>
        <button
          id="nextPageBtn"
          class="btn btn-lg btn-dark"
          style="font-size: 1.5rem; padding: 10px 15px"
        >
          &rarr;
        </button>
      </div>

      <div class="fab-layer">
        <a href="/pages/newpost.html" class="fab-btn fab-left" title="Create a new post">
            <i class="bi bi-plus-lg"></i>
        </a>

        <a href="/pages/searchPage.html" class="fab-btn fab-right" title="Search">
            <i class="bi bi-search"></i>
        </a>
    </div>

    <!-- Footer placeholder for future use -->
    <footer id="footer"></footer>

    <!-- Bootstrap JS — required for interactive components like dropdowns, modals -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDK — authentication and Firestore database -->
    <script type="module" src="../js/firebaseConfig.js"></script>

    <!-- Shared navbar component injection -->
    <script type="module" src="../js/main.js"></script>

    <!-- Main post feed logic: loads posts, renders them, and handles sorting/pagination -->
    <script type="module" src="../js/post.js"></script>
  </body>
</html>
