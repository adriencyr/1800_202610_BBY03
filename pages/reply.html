<!--
    DANIEL UCHECHUKWU-MOSES
    Reply page — lets a user type and submit a reply to a post.
    Before submit: shows a textarea, a Back to Post button, and a Submit Reply button.
    After submit: hides the form, shows a success banner and the posted reply text,
    and reveals a Back to Post button so the user can return to post-details.html.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Reply</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — layout, flex utilities, buttons, and form styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — check icon for success banner, arrow for Back button -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Page-specific styles for the reply page layout and post-submit state -->
    <link rel="stylesheet" href="../css/reply.css">
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared navbar here -->
    <div id="navbar"></div>

    <!-- DANIEL UCHECHUKWU-MOSES — Success banner shown after reply is submitted;
         sits above the main content area and spans full width -->
    <div id="replySuccessBanner">
        <i class="bi bi-check-lg me-2"></i> Reply posted!
    </div>

    <div class="container mt-3 reply-content-area">

        <!-- DANIEL UCHECHUKWU-MOSES — Reply form section (visible before the user submits):
             contains the textarea, a Back to Post link, and the Submit Reply button -->
        <div id="replyFormSection">
            <form id="replyForm">
                <!-- Text input area where the user types their reply -->
                <textarea
                    id="replyTextarea"
                    class="form-control mb-3"
                    placeholder="Type your reply..."
                    rows="10"
                ></textarea>
                <!-- DANIEL UCHECHUKWU-MOSES — Button row: Back to Post goes to post-details.html,
                     Submit Reply triggers the JS that posts the reply and swaps the UI -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="#" class="btn btn-outline-secondary" id="btn-back-to-post">
                        <i class="bi bi-arrow-left me-1"></i> Back to Post
                    </a>
                    <button id="submitReplyBtn" class="btn btn-primary" type="button">
                        <i class="bi bi-check-lg me-1"></i> Submit Reply
                    </button>
                </div>
            </form>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Post-submit state: replaces the form with a gray block
             displaying the reply text the user submitted; hidden until submit fires -->
        <div id="postedReplyBlock" class="p-3">
            <p id="postedReplyText" class="mb-0" style="color:#333;"></p>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Back to Post button shown only after submit;
             lets the user return to post-details.html once their reply is posted -->
        <div id="postSubmitActions" class="d-flex justify-content-end gap-2 mt-3" style="display:none !important;">
            <a href="#" class="btn btn-outline-secondary" id="btn-back-to-post-submit">
                <i class="bi bi-arrow-left me-1"></i> Back to Post
            </a>
        </div>

    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared footer here -->
    <div id="footer"></div>

    <!-- Bootstrap JS — needed for navbar toggle on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads main.js which fetches and injects the shared navbar and footer -->
    <script type="module" src="../js/main.js"></script>

    <!-- reply.js handles form submission and Firestore save -->
    <script type="module" src="../js/reply.js"></script>

</body>

</html>
