<!--
    DANIEL UCHECHUKWU-MOSES
    Reply page — lets a user type and submit a reply to a post.
    Before submit: shows a textarea, a Back to Post button, and a Submit Reply button.
    After submit: hides the form, shows a success banner and the posted reply text,
    and reveals a Back to Post button so the user can return to post-details.html.
-->
<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk - Reply</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS — layout, flex utilities, buttons, and form styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons — check icon for success banner, arrow for Back button -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Global custom styles shared across all pages -->
    <link rel="stylesheet" href="../css/style.css">

    <!-- Page-specific styles for the reply page layout and post-submit state -->
    <link rel="stylesheet" href="../css/reply.css">
</head>

<body>

    <!-- DANIEL UCHECHUKWU-MOSES — Placeholder div; main.js injects the shared navbar here -->
    <div id="navbar"></div>

    <!-- DANIEL UCHECHUKWU-MOSES — Success banner shown after reply is submitted;
         sits above the main content area and spans full width -->
    <div id="replySuccessBanner">
        <i class="bi bi-check-lg me-2"></i> Reply posted!
    </div>

    <div class="container mt-3 reply-content-area">

        <!-- DANIEL UCHECHUKWU-MOSES — Reply form section (visible before the user submits):
             contains the textarea, a Back to Post link, and the Submit Reply button -->
        <div id="replyFormSection">
            <form id="replyForm">
                <!-- Text input area where the user types their reply -->
                <textarea
                    id="replyTextarea"
                    class="form-control mb-3"
                    placeholder="Type your reply..."
                    rows="10"
                ></textarea>
                <!-- DANIEL UCHECHUKWU-MOSES — Button row: Back to Post goes to post-details.html,
                     Submit Reply triggers the JS that posts the reply and swaps the UI -->
                <div class="d-flex justify-content-end gap-2">
                    <a href="post-details.html" class="btn btn-outline-secondary" id="btn-back-to-post">
                        <i class="bi bi-arrow-left me-1"></i> Back to Post
                    </a>
                    <button id="submitReplyBtn" class="btn btn-primary" type="button">
                        <i class="bi bi-check-lg me-1"></i> Submit Reply
                    </button>
                </div>
            </form>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Post-submit state: replaces the form with a gray block
             displaying the reply text the user submitted; hidden until submit fires -->
        <div id="postedReplyBlock" class="p-3">
            <p id="postedReplyText" class="mb-0" style="color:#333;"></p>
        </div>

        <!-- DANIEL UCHECHUKWU-MOSES — Back to Post button shown only after submit;
             lets the user return to post-details.html once their reply is posted -->
        <div id="postSubmitActions" class="d-flex justify-content-end gap-2 mt-3" style="display:none !important;">
            <a href="post-details.html" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Back to Post
            </a>
        </div>

    </div>

    <!-- DANIEL UCHECHUKWU-MOSES — Site-wide footer with brand info, quick links, and contact details -->
    <footer class="bg-dark text-light mt-5 py-4">
        <div class="container">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <h5>futTalk</h5>
                    <p class="text-muted">Your platform for football discussions and connections.</p>
                </div>
                <div class="col-md-4 mb-3">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-light text-decoration-none">About Us</a></li>
                        <li><a href="#" class="text-light text-decoration-none">Contact</a></li>
                        <li><a href="#" class="text-light text-decoration-none">Privacy Policy</a></li>
                        <li><a href="#" class="text-light text-decoration-none">Terms of Service</a></li>
                    </ul>
                </div>
                <div class="col-md-4 mb-3">
                    <h5>Contact Info</h5>
                    <p class="text-muted">
                        <i class="bi bi-envelope"></i> info@futtalk.com<br>
                        <i class="bi bi-telephone"></i> (604) 123-4567<br>
                        <i class="bi bi-geo-alt"></i> Burnaby, BC
                    </p>
                </div>
            </div>
            <hr class="bg-secondary">
            <div class="row">
                <div class="col-md-6">
                    <p class="text-muted mb-0">&copy; 2026 futTalk. All rights reserved.</p>
                </div>
                <!-- Social media icon links -->
                <div class="col-md-6 text-end">
                    <a href="#" class="text-light text-decoration-none me-3"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="text-light text-decoration-none me-3"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="text-light text-decoration-none"><i class="bi bi-instagram"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS — needed for navbar toggle on mobile -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DANIEL UCHECHUKWU-MOSES — Loads main.js which fetches and injects the shared navbar -->
    <script type="module" src="../js/main.js"></script>

    <script>
        // DANIEL UCHECHUKWU-MOSES — Submit reply handler:
        // Reads the textarea value, then switches the page from the form state
        // to the post-submit state (success banner + posted reply block + Back to Post button)
        document.getElementById('submitReplyBtn').addEventListener('click', function () {
            const text = document.getElementById('replyTextarea').value.trim();

            // Do nothing if the textarea is empty
            if (!text) return;

            // Show the dark "Reply posted!" success banner at the top
            document.getElementById('replySuccessBanner').style.display = 'block';

            // Hide the form, show the reply text in the gray block
            document.getElementById('replyFormSection').style.display = 'none';
            document.getElementById('postedReplyText').textContent = text;
            document.getElementById('postedReplyBlock').style.display = 'block';

            // Show the Back to Post button below the posted reply
            document.getElementById('postSubmitActions').style.display = 'flex';
        });
    </script>

</body>

</html>
