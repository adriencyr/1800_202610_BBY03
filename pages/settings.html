<!DOCTYPE html>
<html lang="en">

<head>
    <title>futTalk | Settings</title>
    <meta name="comp1800 template" content="futTalk">

    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

</head>

<body>
    <!------------------------------>
    <!-- Your HTML Layout go here -->
    <!------------------------------>

    <div id="navbar"></div>

    <!-- Stuff for body goes here -->
    <br>

    <div id="uploadSuccessBanner" class="d-none" style="background-color :#222; color: #fff; padding: 0.65rem 1rem;">
        <i class="bi bi-check-lg me-2"></i> Avatar updated!
    </div>
    
    <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">

                    <div class="card p-4 shadow-sm">

                        <div id="settingsView">
                            <h3 class="mb-3 text-center">Settings</h3>
                            <form id="settingsForm" novalidate>
                                <div id="profileImageContainer" class="text-center mb-3">
                                    <img id="avatar" alt="Profile Picture" width="50" height="50" class="rounded-circle" style="object-fit: cover;">
                                </div>
                                <div class="mb-3">
                                    <input type="file" id="inputImage" accept="image/*" class="form-control"/>
                                </div>
                                <button id="saveButton" type="submit" class="btn btn-primary w-100">Save</button>
                            </form>
                        </div>
                    
                    </div>
                
                </div>
            </div>
        </div>

    <div id="footer"></div>

    <!---------------------------------------------->
    <!-- Your own JavaScript functions go here    -->
    <!---------------------------------------------->

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Link to scripts of your own -->
    <script type="module" src="../js/main.js"></script>
    <script type="module" src="../js/settings.js"></script>

</body>

</html>
